<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clean Streak</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&family=Sora:wght@600;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:   #90d26d;
      --glow:    #90d26d7a;
      --warm:    #ffbe5c;
      --danger:  #ff7a59;
      --bg:      #0f1118;
      --card:    #171c29;
      --border:  #2f394f;
      --text:    #f0f4f8;
      --muted:   #8d9caf;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(900px 560px at 12% 5%, #22324766 0%, transparent 62%),
        radial-gradient(760px 500px at 88% 0%, #3b2d1f66 0%, transparent 58%),
        linear-gradient(165deg, #111522 0%, var(--bg) 48%, #0d1719 100%);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      overflow-y: auto;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: .16;
      background:
        repeating-linear-gradient(
          -32deg,
          transparent 0 34px,
          #f9731622 34px 42px,
          transparent 42px 84px
        );
    }

    /* ── Animated starfield ── */
    canvas#stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: .45;
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(92vw, 720px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      padding: 2.2rem 0 4rem;
      margin: auto;
    }

    /* ── Badge ── */
    .badge {
      display: flex;
      align-items: center;
      gap: .5rem;
      background: linear-gradient(120deg, #1f2d31cc 0%, #25323fcc 100%);
      border: 1px solid #46556f;
      border-radius: .55rem;
      padding: .45rem .9rem;
      font-size: .74rem;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: #d8e8ef;
      box-shadow: inset 0 0 0 1px #ffffff14, 0 12px 28px #00000040;
      transform: rotate(-1.2deg);
    }
    .badge-dot {
      width: 9px; height: 9px;
      border-radius: 2px;
      background: var(--danger);
      box-shadow: 0 0 12px #ff7a5999;
      animation: pulse 1.4s ease-in-out infinite;
      transform: rotate(45deg);
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .4; transform: scale(.7); }
    }

    /* ── Heading ── */
    h1 {
      font-family: 'Sora', sans-serif;
      font-size: clamp(1.6rem, 5vw, 2.6rem);
      font-weight: 800;
      text-align: center;
      line-height: 1.15;
      letter-spacing: -.02em;
      background: linear-gradient(125deg, #f8fbff 0%, var(--warm) 42%, var(--green) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 8px 24px #0000004d;
    }
    .sub {
      text-align: center;
      color: var(--muted);
      font-size: .98rem;
      max-width: 420px;
      line-height: 1.45;
    }

    .start-highlight {
      width: 100%;
      border-radius: 1rem;
      padding: 1rem 1.1rem;
      border: 1px solid #4e5f7f;
      background:
        linear-gradient(140deg, #2b374fdd 0%, #20283bd9 55%, #1e2f24d9 100%);
      box-shadow: 0 18px 32px #0000004f, inset 0 0 0 1px #ffffff12;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .42rem;
      position: relative;
      overflow: hidden;
    }

    .start-highlight::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--danger), var(--warm), var(--green));
    }

    .start-kicker {
      font-size: .66rem;
      text-transform: uppercase;
      letter-spacing: .18em;
      color: #b7c6dd;
      font-weight: 700;
    }

    .start-value {
      font-family: 'Sora', sans-serif;
      font-size: clamp(1.05rem, 2.8vw, 1.45rem);
      letter-spacing: .02em;
      color: #f8fbff;
      font-weight: 700;
      text-align: center;
      text-shadow: 0 0 20px #ffffff1f;
      line-height: 1.3;
      font-variant-numeric: tabular-nums;
    }

    /* ── Main counter card ── */
    .hero-card {
      width: 100%;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(145deg, #202736ed 0%, #151b28f0 58%, #121a1ef0 100%),
        var(--card);
      border: 1px solid #3b4961;
      border-radius: 1.65rem;
      padding: 2.5rem 2rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      box-shadow: 0 0 60px #90d26d1f, 0 24px 48px #00000066;
    }

    .hero-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--danger), var(--warm), var(--green));
      opacity: .95;
    }

    .hero-card::after {
      content: '';
      position: absolute;
      top: -100px;
      right: -80px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffbe5c22 0%, #ffbe5c00 68%);
      pointer-events: none;
    }

    .rules {
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: .6rem;
      margin-top: -.5rem;
    }
    .rule {
      position: relative;
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: .42rem .72rem .42rem 1.2rem;
      border-radius: .45rem;
      border: 1px solid #49597a;
      background: linear-gradient(120deg, #192132, #141d2c);
      color: #d8e2ef;
      box-shadow: inset 0 0 0 1px #ffffff10;
    }
    .rule::before {
      content: '';
      position: absolute;
      left: .5rem;
      top: 50%;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      transform: translateY(-50%);
      background: #b8c7dd;
    }
    .rule.sugar {
      border-color: #8a553a;
      color: #ffe4ce;
      background: linear-gradient(120deg, #35231a, #2b1b14);
    }
    .rule.sugar::before {
      background: var(--danger);
    }
    .rule.junk {
      border-color: #3e7450;
      color: #dbf7e1;
      background: linear-gradient(120deg, #13281e, #0f2319);
    }
    .rule.junk::before {
      background: var(--green);
    }

    /* ── Days big number ── */
    .days-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .9rem;
    }
    .days-label {
      font-size: .74rem;
      font-weight: 700;
      letter-spacing: .24em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .ymd-row {
      width: 100%;
      display: flex;
      gap: .9rem;
      justify-content: center;
    }

    .ymd-item {
      flex: 1;
      max-width: 180px;
      border-radius: .95rem;
      padding: 1rem .85rem .78rem;
      border: 1px solid #435372;
      background: linear-gradient(160deg, #1b2436, #131b2a);
      text-align: center;
      box-shadow: inset 0 0 0 1px #ffffff10;
    }

    .ymd-value {
      font-family: 'Sora', sans-serif;
      font-size: clamp(2rem, 8vw, 3rem);
      line-height: 1;
      font-weight: 700;
      color: var(--green);
      text-shadow: 0 0 18px var(--glow);
      font-variant-numeric: tabular-nums;
    }

    .ymd-unit {
      margin-top: .35rem;
      font-size: .68rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }

    /* ── HMS row ── */
    .hms-row {
      display: flex;
      gap: 1rem;
      width: 100%;
      justify-content: center;
    }
    .unit {
      flex: 1;
      max-width: 130px;
      background: linear-gradient(165deg, #1a2235, #141c2a);
      border: 1px solid #374662;
      border-radius: .9rem;
      padding: 1rem .75rem .82rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .3rem;
      box-shadow: inset 0 0 0 1px #ffffff0d;
    }
    .unit:nth-child(1) { border-bottom-color: #5e7ca8; }
    .unit:nth-child(2) { border-bottom-color: #806f52; }
    .unit:nth-child(3) { border-bottom-color: #587e53; }
    .unit:hover {
      transform: translateY(-2px);
      transition: transform .2s ease;
    }
    .unit-value {
      font-family: 'Sora', sans-serif;
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .unit-label {
      font-size: .66rem;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Progress bar ── */
    .progress-wrap {
      width: 100%;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: .75rem;
      color: var(--muted);
      margin-bottom: .58rem;
      letter-spacing: .04em;
    }
    .progress-meta span:last-child { color: var(--green); font-weight: 700; }
    .track {
      width: 100%;
      height: 11px;
      background: linear-gradient(180deg, #0f1625, #121d2a);
      border: 1px solid #324057;
      border-radius: 999px;
      overflow: hidden;
      box-shadow: inset 0 2px 5px #00000080;
    }
    .fill {
      height: 100%;
      background:
        repeating-linear-gradient(
          110deg,
          #ffffff2b 0 10px,
          #ffffff05 10px 20px
        ),
        linear-gradient(90deg, #ff9f68 0%, #f9c15d 40%, var(--green) 100%);
      border-radius: 999px;
      transition: width .6s ease;
      box-shadow: 0 0 10px var(--glow);
      animation: stripe-shift 2.4s linear infinite;
    }

    @keyframes stripe-shift {
      from { background-position: 0 0, 0 0; }
      to   { background-position: 24px 0, 0 0; }
    }

    /* ── Flash on tick ── */
    @keyframes tick-flash {
      0%   { color: #ffffff; text-shadow: 0 0 40px #fff, 0 0 80px var(--glow); }
      100% { color: var(--green); text-shadow: 0 0 40px var(--glow), 0 0 80px var(--glow); }
    }
    .flash { animation: tick-flash .15s ease-out forwards; }

    @media (max-width: 640px) {
      .page {
        width: min(94vw, 720px);
      }

      .hero-card {
        padding: 2.2rem 1rem 1.2rem;
        gap: 1.35rem;
      }

      .start-highlight {
        padding: .85rem .7rem;
      }

      .start-kicker {
        font-size: .62rem;
        letter-spacing: .15em;
      }

      .start-value {
        font-size: clamp(.95rem, 4.2vw, 1.2rem);
      }

      .hms-row {
        gap: .6rem;
      }

      .ymd-row {
        gap: .5rem;
      }

      .ymd-item {
        padding: .8rem .45rem .62rem;
      }

      .unit {
        max-width: none;
        padding: .85rem .45rem .7rem;
      }

      .days-label { letter-spacing: .2em; }
    }
  </style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="page">
  <div class="badge"><span class="badge-dot"></span>No Junk + No Sweets</div>

  <div style="display:flex;flex-direction:column;align-items:center;gap:.5rem">
    <h1>Jim's Clean Fuel Streak</h1>
    <p class="sub">Days choosing real meals over junk food and saying no to added sugar.</p>
  </div>

  <div class="start-highlight" aria-live="polite">
    <div class="start-kicker">Streak Started</div>
    <div class="start-value" id="start-label">-</div>
  </div>

  <div class="hero-card">

    <div class="rules">
      <span class="rule junk">No Junk Snacks</span>
      <span class="rule sugar">No Sweets</span>
      <span class="rule">Whole Food First</span>
    </div>

    <div class="days-block">
      <div class="days-label">Time Clean</div>
      <div class="ymd-row">
        <div class="ymd-item">
          <div class="ymd-value" id="years">0</div>
          <div class="ymd-unit">Years</div>
        </div>
        <div class="ymd-item">
          <div class="ymd-value" id="months">0</div>
          <div class="ymd-unit">Months</div>
        </div>
        <div class="ymd-item">
          <div class="ymd-value" id="days-part">0</div>
          <div class="ymd-unit">Days</div>
        </div>
      </div>
    </div>

    <div class="hms-row">
      <div class="unit">
        <div class="unit-value" id="hours">00</div>
        <div class="unit-label">Hours</div>
      </div>
      <div class="unit">
        <div class="unit-value" id="minutes">00</div>
        <div class="unit-label">Minutes</div>
      </div>
      <div class="unit">
        <div class="unit-value" id="seconds">00</div>
        <div class="unit-label">Seconds</div>
      </div>
    </div>

    <div class="progress-wrap" id="progress-wrap" style="display:none">
      <div class="progress-meta">
        <span id="progress-label">Next milestone</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="track"><div class="fill" id="fill" style="width:0%"></div></div>
    </div>

  </div>

</div>

<script>
  // ─── CONFIG ────────────────────────────────────────────────────────────────
  // Change this to your actual start date/time
  const START = new Date('2026-06-16T23:00:00');

  const MILESTONES = [
    { days: 1,   icon: '⚡', name: '24h Sugar-Free' },
    { days: 3,   icon: '🌱', name: 'Craving Reset'  },
    { days: 7,   icon: '🔥', name: '1 Clean Week'   },
    { days: 14,  icon: '💪', name: '2 Weeks Strong' },
    { days: 21,  icon: '🧠', name: 'Habit Locked'   },
    { days: 30,  icon: '🏅', name: '1 Clean Month'  },
    { days: 60,  icon: '🚀', name: '2 Months Solid' },
    { days: 90,  icon: '🏆', name: 'Quarter Clean'  },
    { days: 180, icon: '💎', name: 'Half-Year Clean'},
    { days: 365, icon: '👑', name: '1 Year Clean'   },
  ];
  // ───────────────────────────────────────────────────────────────────────────

  // Format start date label
  const startLabel = document.getElementById('start-label');
  startLabel.textContent = START.toLocaleString('en-GB', {
    weekday:'short', day:'2-digit', month:'short', year:'numeric',
    hour:'2-digit', minute:'2-digit'
  });

  // Pad helper
  const pad = n => String(Math.floor(n)).padStart(2, '0');

  // Flash helper
  const flashEl = document.getElementById('days-part');
  let lastDay = -1;

  function getElapsedYMD(startDate, endDate) {
    if (endDate <= startDate) {
      return { years: 0, months: 0, days: 0 };
    }

    const cursor = new Date(startDate);
    let years = 0;
    let months = 0;

    while (true) {
      const next = new Date(cursor);
      next.setFullYear(next.getFullYear() + 1);
      if (next <= endDate) {
        cursor.setFullYear(cursor.getFullYear() + 1);
        years += 1;
      } else {
        break;
      }
    }

    while (true) {
      const next = new Date(cursor);
      next.setMonth(next.getMonth() + 1);
      if (next <= endDate) {
        cursor.setMonth(cursor.getMonth() + 1);
        months += 1;
      } else {
        break;
      }
    }

    const days = Math.floor((endDate.getTime() - cursor.getTime()) / 86400000);
    return { years, months, days };
  }

  function tick() {
    const now   = Date.now();
    const diff  = Math.max(0, now - START.getTime());
    const elapsedDays = diff / 86400000;
    const ymd = getElapsedYMD(START, new Date(now));

    const totalSeconds = Math.floor(diff / 1000);
    const s  = totalSeconds % 60;
    const m  = Math.floor(totalSeconds / 60) % 60;
    const h  = Math.floor(totalSeconds / 3600) % 24;
    const d  = Math.floor(totalSeconds / 86400);

    document.getElementById('seconds').textContent = pad(s);
    document.getElementById('minutes').textContent = pad(m);
    document.getElementById('hours').textContent   = pad(h);
    document.getElementById('years').textContent   = ymd.years;
    document.getElementById('months').textContent  = ymd.months;
    document.getElementById('days-part').textContent = ymd.days;

    // Flash on new day
    if (d !== lastDay && lastDay !== -1) {
      flashEl.classList.remove('flash');
      void flashEl.offsetWidth; // reflow
      flashEl.classList.add('flash');
    }
    lastDay = d;

    // Progress bar to next milestone
    const next = MILESTONES.find(ms => elapsedDays < ms.days);
    if (next) {
      const prev = MILESTONES.slice().reverse().find(ms => ms.days <= elapsedDays);
      const from = prev ? prev.days : 0;
      const ratio = (elapsedDays - from) / (next.days - from);
      const pct = Math.max(0, Math.min(100, Math.round(ratio * 100)));
      const daysLeft = Math.max(0, Math.ceil(next.days - elapsedDays));
      document.getElementById('progress-wrap').style.display = '';
      document.getElementById('progress-label').textContent  = `Next: ${next.name} (${daysLeft}d left)`;
      document.getElementById('progress-pct').textContent    = `${pct}%`;
      document.getElementById('fill').style.width            = `${pct}%`;
    } else {
      document.getElementById('progress-wrap').style.display = 'none';
    }
  }

  tick();
  setInterval(tick, 1000);

  // ── Starfield canvas ────────────────────────────────────────────────────────
  (function () {
    const canvas = document.getElementById('stars');
    const ctx    = canvas.getContext('2d');
    let W, H, stars = [];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    function makeStars(n) {
      stars = Array.from({ length: n }, () => ({
        x:  Math.random() * W,
        y:  Math.random() * H,
        r:  Math.random() * 1.2 + .2,
        a:  Math.random(),
        da: (Math.random() * .003 + .001) * (Math.random() < .5 ? 1 : -1),
      }));
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      stars.forEach(s => {
        s.a += s.da;
        if (s.a > 1 || s.a < 0) s.da *= -1;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.a})`;
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }

    resize();
    makeStars(180);
    draw();
    window.addEventListener('resize', () => { resize(); makeStars(180); });
  })();
</script>
</body>
</html>
